<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>扫码神器</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="扫码神器">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f0f2f5;min-height:100vh;user-select:none}
.login-page{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1a1a2e,#16213e);display:flex;justify-content:center;align-items:center;z-index:9999}
.login-card{background:#fff;border-radius:16px;padding:36px 28px;width:90%;max-width:360px;text-align:center}
.login-card h1{font-size:22px;margin-bottom:16px}
.login-card input{width:100%;padding:13px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;text-align:center;outline:none;margin-bottom:8px}
.login-card input:focus{border-color:#4472C4}
.login-card button{width:100%;padding:13px;background:#4472C4;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer}
.login-err{color:#C00000;font-size:13px;margin-top:8px;min-height:20px}
.main-page{display:none}
/* 顶栏 */
.top{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:8px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:99}
.top h1{font-size:15px;flex:1}
.top .btn-lock{background:none;border:1px solid rgba(255,255,255,.4);color:#fff;padding:5px 10px;border-radius:5px;font-size:11px;cursor:pointer}
/* 文件夹栏 */
.folder-bar{display:flex;gap:6px;padding:10px;max-width:500px;margin:0 auto;align-items:center}
.folder-bar select{flex:1;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:14px;background:#fff;outline:none}
.folder-bar select:focus{border-color:#4472C4}
.folder-bar button{padding:10px 12px;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;white-space:nowrap}
.btn-new{background:#548235;color:#fff}
.btn-del-folder{background:#C00000;color:#fff;font-size:12px!important}
/* 扫码区 */
#reader-wrap{margin:6px auto;max-width:500px}
#reader{width:100%;max-width:360px;height:240px;border:3px solid #4472C4;border-radius:10px;overflow:hidden;background:#000;margin:0 auto}
.manual-bar{display:flex;gap:5px;padding:6px 10px;max-width:500px;margin:0 auto}
.manual-bar input{flex:1;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:14px;font-family:Consolas,monospace;outline:none}
.manual-bar input:focus{border-color:#4472C4}
.manual-bar button{padding:10px 14px;background:#4472C4;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer}
.mode-bar{display:flex;gap:4px;padding:0 10px;max-width:500px;margin:0 auto}
.mode-bar button{flex:1;padding:7px 3px;border:2px solid #4472C4;border-radius:6px;font-size:11px;font-weight:bold;cursor:pointer;background:#fff;color:#4472C4}
.mode-bar button.active{background:#4472C4;color:#fff}
.act-bar{display:flex;gap:4px;padding:6px 10px;max-width:500px;margin:0 auto}
.act-bar button{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer}
.b-start{background:#548235;color:#fff}
.b-stop{background:#999;color:#fff}
.b-clear{background:#ED7D31;color:#fff}
.b-export{background:#4472C4;color:#fff}
.hint{text-align:center;padding:4px;font-size:12px;color:#888}
/* 列表 */
#list{max-width:500px;margin:0 auto;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);padding-bottom:20px}
.row{padding:8px 10px;border-bottom:1px solid #f3f3f3;cursor:pointer}
.row:active{background:#e8f0fe}
.row .main{display:flex;align-items:center;font-size:13px}
.row .n{color:#999;font-size:11px;min-width:24px}
.row .v{font-family:Consolas,monospace;flex:1;margin:0 6px;color:#333;font-size:14px;word-break:break-all}
.row .q{color:#548235;font-weight:bold;margin-right:8px;font-size:12px}
.row .t{font-size:11px;color:#aaa;white-space:nowrap}
.row .tags{display:flex;gap:4px;margin-top:3px;margin-left:24px;flex-wrap:wrap}
.row .tags span{font-size:11px;padding:2px 7px;border-radius:10px;background:#f0f0f0;color:#666;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .tags span.filled{background:#e8f0fe;color:#4472C4}
.empty-state{padding:50px;text-align:center;color:#bbb}
/* 扫码成功浮层 */
.scan-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#548235;color:#fff;padding:20px 40px;border-radius:16px;font-size:18px;font-weight:bold;z-index:180;pointer-events:none;opacity:0;transition:opacity .15s}
.scan-pop.show{opacity:1}
/* 弹窗 */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:150;display:none;justify-content:center;align-items:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:20px;width:90%;max-width:420px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:17px;margin-bottom:4px}
.modal .sub{font-size:12px;color:#999;margin-bottom:12px;word-break:break-all}
.modal label{display:block;font-size:13px;color:#666;margin-top:8px;margin-bottom:3px}
.modal input{width:100%;padding:9px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
.modal input:focus{border-color:#4472C4}
.modal .btns{display:flex;gap:8px;margin-top:14px}
.modal .btns button{flex:1;padding:11px;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer}
.btn-save{background:#4472C4;color:#fff}
.btn-cancel{background:#eee;color:#666}
.btn-del{background:#C00000;color:#fff;flex:0.5!important}
/* 预览表 */
.preview-table{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0}
.preview-table th{background:#4472C4;color:#fff;padding:6px 8px;text-align:center;position:sticky;top:0}
.preview-table td{padding:5px 8px;text-align:center;border-bottom:1px solid #eee;font-family:Consolas,monospace;font-size:11px}
.preview-table tr:nth-child(even){background:#f9f9f9}
.preview-wrap{max-height:50vh;overflow-y:auto;border:1px solid #ddd;border-radius:8px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.82);color:#fff;padding:12px 28px;border-radius:20px;font-size:15px;z-index:200;pointer-events:none;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- 登录 -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <h1>扫码神器</h1>
    <input type="password" id="pwInput" placeholder="密码" autofocus onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">登 录</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- 主界面 -->
<div class="main-page" id="mainPage">
  <div class="top">
    <h1>扫码神器</h1>
    <span style="font-size:11px;opacity:.7" id="total">0条</span>
    <button class="btn-lock" onclick="logout()">锁定</button>
  </div>

  <!-- 步骤1: 文件夹 -->
  <div style="padding:12px 10px 4px;max-width:500px;margin:0 auto;text-align:center;color:#999;font-size:12px">步骤1 — 选择或新建文件夹</div>
  <div class="folder-bar">
    <select id="folderSelect" onchange="switchFolder()"></select>
    <button class="btn-new" onclick="newFolder()">+新建</button>
    <button class="btn-del-folder" onclick="delFolder()">删</button>
  </div>

  <!-- 步骤2: 扫描类型 -->
  <div style="padding:8px 10px 4px;max-width:500px;margin:0 auto;text-align:center;color:#999;font-size:12px">步骤2 — 扫描类型</div>
  <div class="mode-bar">
    <button id="btn-barcode" class="active" onclick="setMode('barcode')">条形码</button>
    <button id="btn-qrcode" onclick="setMode('qrcode')">二维码</button>
  </div>

  <!-- 步骤2.5: 条码过滤 -->
  <div style="padding:4px 10px 2px;max-width:500px;margin:0 auto;text-align:center;color:#999;font-size:12px">条码过滤</div>
  <div class="mode-bar">
    <button id="btn-any" class="active" onclick="setFilter('any')">任意</button>
    <button id="btn-digit" onclick="setFilter('digit')">数字开头</button>
    <button id="btn-letter" onclick="setFilter('letter')">字母开头</button>
  </div>

  <!-- 步骤2.6: 计数模式 -->
  <div style="padding:4px 10px 2px;max-width:500px;margin:0 auto;text-align:center;color:#999;font-size:12px">计数模式</div>
  <div class="mode-bar">
    <button id="btn-dup" class="active" onclick="setCountMode('dup')">重复保留(每扫一行)</button>
    <button id="btn-count" onclick="setCountMode('count')">自动计数(叠加数量)</button>
  </div>

  <!-- 步骤3: 开扫 -->
  <div style="padding:8px 10px 4px;max-width:500px;margin:0 auto;text-align:center;color:#999;font-size:12px">步骤3 — 开始扫码</div>
  <div class="act-bar">
    <button class="b-start" onclick="startScan()" id="btnStartScan">开始扫码</button>
    <button class="b-stop" onclick="stopScan()" id="btnStopScan" style="display:none">停止扫码</button>
  </div>

  <!-- 扫码区域（默认隐藏，冻结在顶部） -->
  <div id="scanArea" style="display:none;position:sticky;top:48px;z-index:50;background:#f0f2f5;padding-bottom:6px;border-bottom:2px solid #ddd">
    <div class="manual-bar">
      <input type="text" id="manualInput" placeholder="手动输入条码">
      <button onclick="manualAdd()">添加</button>
    </div>
    <div id="reader-wrap"><div id="reader"></div></div>
    <div class="hint" id="hint">摄像头已开启，对准条码…</div>
  </div>

  <!-- 操作 -->
  <div class="act-bar">
    <button class="b-clear" onclick="clearAll()">清空</button>
    <button class="b-export" onclick="previewExport()">导出Excel</button>
  </div>

  <div id="list"><div class="empty-state">暂无记录</div></div>
</div>

<!-- 扫码成功浮层 -->
<div class="scan-pop" id="scanPop">✓ 扫码成功</div>

<!-- 备注弹窗 -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>编辑</h3><div class="sub" id="modalBc"></div>
    <label>数量</label><input type="number" id="editQty" value="1" min="1" max="999">
    <label>备注 1</label><input type="text" id="r1" placeholder="颜色">
    <label>备注 2</label><input type="text" id="r2" placeholder="尺码">
    <label>备注 3</label><input type="text" id="r3" placeholder="位置">
    <div class="btns">
      <button class="btn-del" onclick="delItem()">删除</button>
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveRemarks()">保存</button>
    </div>
  </div>
</div>

<!-- 导出预览弹窗 -->
<div class="modal-bg" id="previewBg" onclick="if(event.target===this)closePreview()">
  <div class="modal" style="max-width:500px">
    <h3>导出预览</h3>
    <div class="sub" id="previewInfo"></div>
    <div class="preview-wrap" id="previewContent"></div>
    <div class="btns">
      <button class="btn-cancel" onclick="closePreview()">取消</button>
      <button class="btn-save" onclick="doExport()">确认导出</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════ 密码 ═══════
const PASS_HASH = 'e65463a5deed8ee331bf75d3c869082b18d9b3f527d8d04fbfa3c8bb1a3b9874';
const SALT = 'scan2026';

async function sha256(m){const b=new TextEncoder().encode(m+SALT);const h=await crypto.subtle.digest('SHA-256',b);return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');}
async function login(){const h=await sha256(document.getElementById('pwInput').value);if(h===PASS_HASH){localStorage.setItem('_auth','1');document.getElementById('loginPage').style.display='none';document.getElementById('mainPage').style.display='block';init();}else{document.getElementById('loginErr').textContent='密码错误';}}
function logout(){localStorage.removeItem('_auth');document.getElementById('loginPage').style.display='flex';document.getElementById('mainPage').style.display='none';stopScan();}
if(localStorage.getItem('_auth')==='1'){document.getElementById('loginPage').style.display='none';document.getElementById('mainPage').style.display='block';}

// ═══════ 数据库 ═══════
const DB='ScanDB',ST='sessions';
let db,currentFolder='default';
function openDB(){return new Promise(r=>{const req=indexedDB.open(DB,1);req.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(ST))d.createObjectStore(ST,{keyPath:'name'});};req.onsuccess=e=>{db=e.target.result;r();};});}
function dbGet(name){return new Promise(r=>{const tx=db.transaction(ST,'readonly');const req=tx.objectStore(ST).get(name);req.onsuccess=()=>r(req.result||{name,scans:[]});});}
function dbPut(session){return new Promise(r=>{const tx=db.transaction(ST,'readwrite');tx.objectStore(ST).put(session);tx.oncomplete=()=>r();});}
function dbDel(name){return new Promise(r=>{const tx=db.transaction(ST,'readwrite');tx.objectStore(ST).delete(name);tx.oncomplete=()=>r();});}
function dbList(){return new Promise(r=>{const tx=db.transaction(ST,'readonly');const req=tx.objectStore(ST).getAll();req.onsuccess=()=>r(req.result.map(s=>({name:s.name,count:s.scans.length})));});}

// ═══════ 文件夹 ═══════
async function loadFolders(){
  const list=await dbList();
  const sel=document.getElementById('folderSelect');
  sel.innerHTML=list.map(s=>`<option value="${escAttr(s.name)}">${escHtml(s.name)} (${s.count}条)</option>`).join('');
  if(!list.find(s=>s.name===currentFolder)){currentFolder=list[0]?.name||'default';}
  sel.value=currentFolder;
}
async function switchFolder(){currentFolder=document.getElementById('folderSelect').value;await render();}
async function newFolder(){
  const name=prompt('新建文件夹名称：').trim();
  if(!name)return;
  if(name.length>30){toast('名称最长30个字符');return;}
  await dbPut({name,scans:[]});
  currentFolder=name;
  await loadFolders();
  await render();
  toast('已创建：'+name);
}
async function delFolder(){
  const name=currentFolder;
  if(name==='default'){toast('不能删除默认文件夹');return;}
  if(!confirm(`删除文件夹「${name}」及其全部 ${scans.length} 条记录？`))return;
  await dbDel(name);
  currentFolder='default';
  await loadFolders();
  await render();
  toast('已删除');
}

// ═══════ 数据 ═══════
let scans=[],editId=null;
async function render(){
  const session=await dbGet(currentFolder);
  scans=session.scans;
  document.getElementById('total').textContent=scans.length+'条';
  const list=document.getElementById('list');
  if(!scans.length){list.innerHTML='<div class="empty-state">暂无记录</div>';return;}
  list.innerHTML=scans.map((s,i)=>`
    <div class="row" onclick="openModal(${i})">
      <div class="main">
        <span class="n">${i+1}</span>
        <span class="v">${escHtml(s.bc)}</span>
        <span class="q">×${s.qty||1}</span>
        <span class="t">${s.time}</span>
      </div>
      ${[s.r1,s.r2,s.r3].filter(Boolean).length?`<div class="tags">${[s.r1,s.r2,s.r3].filter(Boolean).map(t=>`<span class="filled">${escHtml(t)}</span>`).join('')}</div>`:'<div class="tags"><span>点此备注</span></div>'}
    </div>`).join('');
}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return(s||'').replace(/"/g,'&quot;');}

// ═══════ 扫码 ═══════
let scanMode='barcode',scanner=null,scanning=false,filterMode='any',countMode='dup';

function setFilter(m){filterMode=m;document.querySelectorAll('.mode-bar').forEach(b=>{if(['any','digit','letter'].includes(b.id.split('-')[1]))b.classList.remove('active')});document.getElementById('btn-'+m).classList.add('active');}
function setCountMode(m){countMode=m;['btn-dup','btn-count'].forEach(id=>document.getElementById(id).classList.remove('active'));document.getElementById('btn-'+m).classList.add('active');}

function matchFilter(bc){
  if(filterMode==='digit')return /^\d/.test(bc);
  if(filterMode==='letter')return /^[A-Za-z]/.test(bc);
  return true;
}

function setMode(m){scanMode=m;['btn-barcode','btn-qrcode'].forEach(id=>document.getElementById(id).classList.remove('active'));document.getElementById('btn-'+m).classList.add('active');if(scanning){stopScan();startScan();}}

async function startScan(){
  if(scanning)return;
  // 先显示元素，等布局完成再启动相机
  const area=document.getElementById('scanArea');
  area.style.display='block';
  document.getElementById('btnStartScan').style.display='none';
  document.getElementById('btnStopScan').style.display='block';
  // 等 400ms 确保 DOM 渲染完毕
  await new Promise(r=>setTimeout(r,400));
  if(!scanner)scanner=new Html5Qrcode("reader");
  try{
    await scanner.start({facingMode:"environment"},{fps:15,qrbox:{width:250,height:160},aspectRatio:1.0,experimentalFeatures:{useBarCodeDetectorIfSupported:true}},
      async text=>{
        const bc=text.trim();
        if(scanCooldown||bc===lastBarcode){return;}
        if(!matchFilter(bc)){toast('已过滤: '+bc);return;}
        lastBarcode=bc;
        await addScan(bc);
        showScanPop(bc);
        speak(bc+' 扫码成功');
        startCooldown();
      },
      ()=>{});
    scanning=true;
  }catch(e){toast('摄像头失败: '+e.message);}
}
async function stopScan(){
  if(scanner&&scanning){try{await scanner.stop();}catch(e){}}
  scanning=false;
  document.getElementById('scanArea').style.display='none';
  document.getElementById('btnStartScan').style.display='block';
  document.getElementById('btnStopScan').style.display='none';
}

// 防连扫 + 反馈
let scanCooldown=false,lastBarcode='';
function showScanPop(bc){const p=document.getElementById('scanPop');p.innerHTML='✓ '+escHtml(bc);p.classList.add('show');clearTimeout(p._t);p._t=setTimeout(()=>p.classList.remove('show'),1200);}
function speak(text){
  try{
    speechSynthesis.cancel(); // 先清掉之前的
    const u=new SpeechSynthesisUtterance(text);
    u.lang='zh-CN';u.rate=0.9;u.volume=1;
    // 有些浏览器需要延迟一下
    setTimeout(()=>speechSynthesis.speak(u),100);
  }catch(e){}
}
function startCooldown(ms=1800){
  scanCooldown=true;
  setTimeout(()=>{scanCooldown=false;},ms);
}

// ═══════ 操作 ═══════
async function addScan(bc){
  if(countMode==='count'){
    // 自动计数：找已存在的条码叠加数量
    const exist=scans.find(s=>s.bc===bc);
    if(exist){exist.qty=(exist.qty||1)+1;await dbPut({name:currentFolder,scans});await render();return;}
  }
  scans.push({bc,qty:1,r1:'',r2:'',r3:'',time:new Date().toLocaleString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})});
  await dbPut({name:currentFolder,scans});
  await render();
}
async function manualAdd(){const v=document.getElementById('manualInput').value.trim();if(!v)return;if(!matchFilter(v)){toast('已过滤: '+v);document.getElementById('manualInput').value='';return;}await addScan(v);document.getElementById('manualInput').value='';document.getElementById('manualInput').focus();showScanPop(v);speak(v+' 扫码成功');}
function openModal(i){editId=i;const s=scans[i];document.getElementById('modalBc').textContent='条码: '+s.bc;document.getElementById('editQty').value=s.qty||1;document.getElementById('r1').value=s.r1||'';document.getElementById('r2').value=s.r2||'';document.getElementById('r3').value=s.r3||'';document.getElementById('modalBg').classList.add('show');}
function closeModal(){document.getElementById('modalBg').classList.remove('show');editId=null;}
async function saveRemarks(){
  if(editId==null)return;
  scans[editId].qty=parseInt(document.getElementById('editQty').value)||1;
  scans[editId].r1=document.getElementById('r1').value.trim();
  scans[editId].r2=document.getElementById('r2').value.trim();
  scans[editId].r3=document.getElementById('r3').value.trim();
  await dbPut({name:currentFolder,scans});await render();closeModal();toast('已保存');
}
async function delItem(){if(editId==null||!confirm('删除？'))return;scans.splice(editId,1);await dbPut({name:currentFolder,scans});await render();closeModal();toast('已删除');}
async function clearAll(){if(!scans.length||!confirm(`删除「${currentFolder}」全部 ${scans.length} 条？`))return;await dbPut({name:currentFolder,scans:[]});await render();toast('已清空');}

// ═══════ 导出 ═══════
function previewExport(){
  if(!scans.length){toast('无数据');return;}
  document.getElementById('previewInfo').textContent=`文件夹「${currentFolder}」共 ${scans.length} 条`;
  let html='<table class="preview-table"><tr><th>扫码内容</th><th>数量</th><th>备注1</th><th>备注2</th><th>备注3</th><th>扫码时间</th></tr>';
  scans.forEach(s=>{html+=`<tr><td>${escHtml(s.bc)}</td><td>${s.qty||1}</td><td>${escHtml(s.r1)}</td><td>${escHtml(s.r2)}</td><td>${escHtml(s.r3)}</td><td>${s.time}</td></tr>`;});
  html+='</table>';
  document.getElementById('previewContent').innerHTML=html;
  document.getElementById('previewBg').classList.add('show');
}
function closePreview(){document.getElementById('previewBg').classList.remove('show');}
function doExport(){
  const d=new Date(),ds=`${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
  const data=[['扫码内容','数量','备注1','备注2','备注3','扫码时间']];
  scans.forEach(s=>data.push([s.bc,s.qty||1,s.r1,s.r2,s.r3,s.time]));
  const ws=XLSX.utils.aoa_to_sheet(data);ws['!cols']=[{wch:28},{wch:8},{wch:14},{wch:14},{wch:14},{wch:16}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'扫码记录');
  XLSX.writeFile(wb,`${currentFolder}_${ds}_${scans.length}条.xlsx`);
  closePreview();toast('已导出');
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}

// ═══════ 启动 ═══════
async function init(){await openDB();await loadFolders();await render();}
init();
</script>
</body>
